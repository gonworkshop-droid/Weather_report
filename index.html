<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家居資訊板</title>
    <style>
        /* === 版面設計 (CSS) 教學 === */
        body {
            background-color: #0d0d0d; /* 更加深色，適合長著屏幕 */
            color: #e0e0e0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 25px;
            display: flex; 
            flex-direction: row; /* 橫向排列：左邊天氣、右邊巴士 */
            gap: 25px;
            height: 92vh;
            box-sizing: border-box;
        }

        /* 為了方便舊型號 iPad/iPhone 直向擺放，如果屏幕寬度太窄，自動切換成上下排版 */
        @media (max-width: 768px) {
            body { flex-direction: column; height: auto; }
        }

        .panel {
            background-color: #1a1a1a;
            border-radius: 20px; /* 更加圓潤的現代感 */
            padding: 25px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        /* 天氣面板佔 40% 寬度 */
        #weather-panel {
            flex: 4; 
            overflow-y: auto; /* 天氣預報太長時可滾動 */
        }

        /* 巴士面板佔 60% 寬度 */
        #bus-panel {
            flex: 6;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 28px;
            color: #5cc5ff; /* 標題淺藍色 */
            border-bottom: 2px solid #2d2d2d;
            padding-bottom: 12px;
        }

        /* 天氣每行樣式 */
        .weather-item {
            font-size: 22px; 
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 1px solid #2d2d2d;
            line-height: 1.5;
        }
        .weather-desc {
            font-size: 16px; 
            color: #8a8a8a;
        }

        /* 巴士雙車站容器：左右並排 */
        .bus-stations-container {
            display: flex;
            gap: 20px;
            flex: 1;
        }

        .station-box {
            background-color: #242424;
            border-radius: 12px;
            padding: 15px;
            flex: 1; /* 兩個車站平分右邊空間 */
        }

        .station-title {
            font-size: 20px;
            color: #ffd166; /* 車站名用黃色 */
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 1px solid #3d3d3d;
            padding-bottom: 8px;
        }

        .bus-item {
            font-size: 24px; 
            margin-bottom: 12px;
        }

        .eta-time {
            color: #ff7b00; /* 剩餘分鐘用顯眼的橙色 */
            font-weight: bold;
            font-size: 28px;
        }
    </style>
</head>
<body>

    <div class="panel" id="weather-panel">
        <h2>⛅ 天文台 7天天氣預報</h2>
        <div id="weather-data">正在讀取天氣資料...</div>
    </div>

    <div class="panel" id="bus-panel">
        <h2>🚌 城巴 701 到站時間</h2>
        <div class="bus-stations-container">
            <div class="station-box">
                <div class="station-title">📍 南昌站 (深旺道)</div>
                <div id="bus-data-namcheong">正在讀取...</div>
            </div>
            <div class="station-box">
                <div class="station-title">📍 深水埗公園 (通州街)</div>
                <div id="bus-data-ssp">正在讀取...</div>
            </div>
        </div>
    </div>

    <script>
        // 1. 拿取香港天文台天氣數據
        async function fetchWeather() {
            try {
                const response = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=fnd&lang=tc');
                const data = await response.json();
                
                let htmlContent = '';
                const sevenDays = data.weatherForecast.slice(0, 7);
                
                sevenDays.forEach(day => {
                    const dateStr = day.forecastDate.substring(6, 8) + '/' + day.forecastDate.substring(4, 6);
                    htmlContent += `
                        <div class="weather-item">
                            <strong>${dateStr} (${day.week})</strong> : ${day.forecastMintemp.value}°C - ${day.forecastMaxtemp.value}°C 
                            <div class="weather-desc">${day.forecastWeather}</div>
                        </div>
                    `;
                });
                
                document.getElementById('weather-data').innerHTML = htmlContent;
            } catch (error) {
                document.getElementById('weather-data').innerHTML = '無法載入天氣資料';
            }
        }

        // 2. 核心：拿取指定巴士站的通用函式
        async function getBusData(stopId, elementId) {
            try {
                const response = await fetch(`https://rt.data.gov.hk/v1.1/transport/citybus-nwfb/eta/CTB/${stopId}/701`);
                const data = await response.json();
                
                let htmlContent = '';
                if(data.data && data.data.length > 0) {
                    // 只拿取前 3 班車
                    const nextBuses = data.data.slice(0, 3);
                    nextBuses.forEach((bus, index) => {
                        if (!bus.eta) return; // 防呆：如果沒有實時時間則跳過
                        
                        const eta = new Date(bus.eta);
                        const now = new Date();
                        const diffMins = Math.round((eta - now) / 60000);
                        
                        let timeStr = diffMins <= 0 ? '即將到站' : `<span class="eta-time">${diffMins}</span> 分鐘`;
                        
                        htmlContent += `
                            <div class="bus-item">
                                班次 ${index + 1}：${timeStr}
                            </div>
                        `;
                    });
                } else {
                    htmlContent = '<div style="color:#aaa; font-size:18px;">暫無班次資料</div>';
                }
                document.getElementById(elementId).innerHTML = htmlContent;
            } catch (error) {
                document.getElementById(elementId).innerHTML = '<div style="color:red; font-size:18px;">網絡錯誤</div>';
            }
        }

        // 3. 同時更新所有巴士站
        function updateAllBuses() {
            getBusData('002593', 'bus-data-namcheong'); // 南昌站
            getBusData('003917', 'bus-data-ssp');       // 深水埗公園
        }

        // 啟動與定時更新
        fetchWeather(); 
        updateAllBuses();  
        setInterval(updateAllBuses, 30000); // 放在家裡看，調快到每 30 秒更新一次巴士時間
    </script>
</body>
</html>
